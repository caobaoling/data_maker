version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: datamaker-backend
    ports:
      - "5000:5000"
    volumes:
      - ./common:/app/common
      - ./config:/app/config
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - datamaker-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: datamaker-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - datamaker-network

networks:
  datamaker-network:
    driver: bridge
